<!doctype html>

              />

          <div class="title">

          </div>
          <div id="hamburger" class="hamburger">
            <i class="fa-solid fa-bars"></i>
          </div>
        </div>

        <nav class="global-nav">
          <div id="close" class="close">
            <!-- <h1>これがナビゲーションじゃい</h1> -->

          <menu>

          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>

      <!-- アニメーション -->
      <div class="container">
        <div class="big-index">
          <strong class="fadein">部室の紹介</strong>
        </div>
      </div>

          <p>
            ここに部室の紹介文が入ります。部室の特徴や設備などを詳しく説明します。
          </p>
        </div>
        <div class="room-img-header">

          <div class="room-img-index" data-index="1">PC①</div>
          <div class="room-img-index" data-index="2">PC②</div>

        </div>
        <div class="room-img-container container">
          <img
            src="../sample.png"
            width="100%"
            height="auto"
            alt="部室の画像1"
            id="room-img"
          />

            <p id="room-intro" class="fadein">
              ここに部室の紹介文が入ります。部室の特徴や設備などを詳しく説明します。
            </p>
          </div>
