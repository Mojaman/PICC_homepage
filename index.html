    <script>
      $(".center").slick({
        centerMode: true,
        centerPadding: "10%",
        slidesToShow: 3,
        slidesToScroll: 3,
        arrows: false,

        autoplay: true, // 自動再生
        autoplaySpeed: 0, // 自動再生速度0
        speed: 5000, // スライド移動速度（長くすると遅くなる）
        cssEase: "linear", // 等速に設定
